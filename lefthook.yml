pre-commit:
  parallel: true
  jobs:
    - name: ruff-check
      glob: "*.py"
      run: uv run ruff check --fix {staged_files}
      stage_fixed: true
    - name: ruff-format
      glob: "*.py"
      run: uv run ruff format {staged_files}
      stage_fixed: true
    - name: pyright
      glob: "*.py"
      run: uv run pyright {staged_files}
    - name: toml-sort
      glob: "*.toml"
      run: uv run toml-sort -i {staged_files}
      stage_fixed: true
